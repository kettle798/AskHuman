name: ci

# 持续集成校验：PR / push / 手动触发时编译并跑测试，确保 4 平台可构建。
# 不负责发布；正式发布（npm 主包+子包 + GitHub Release）见 release.yml（由 tag 触发）。

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # 每周一 03:00 UTC 复查依赖漏洞（RustSec 随时可能对既有 Cargo.lock 发新通告）。
    - cron: "0 3 * * 1"

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --file src-tauri/Cargo.lock

  build:
    name: ${{ matrix.target }}
    # 定时触发只做 audit；四平台构建仍由 push / PR / 手动驱动。
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 提供 Xcode 26 / macOS 26 SDK（Swift 语音桥用到 macOS 26 专有 API，需 26 SDK 编译）。
          - os: macos-26
            target: aarch64-apple-darwin
          # x64 也在 arm64 runner 上交叉编译，避开稀缺/排队久的 Intel runner
          - os: macos-26
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true # 图标走 Git LFS，需拉取真实文件，否则 tauri 打包读到指针报「Invalid PNG signature」

      - name: Install Linux system deps (WebKitGTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: vitest (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: pnpm test

      # 门禁：警告即失败（存量已清零）；fmt / clippy 只需跑一个平台。
      - name: rustfmt + clippy (Linux only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      # macOS 也跑测试：objc2 / QuickLook / launchd 等平台代码只在这里能被覆盖。
      - name: cargo test (Linux + macOS arm64)
        if: startsWith(matrix.os, 'ubuntu') || matrix.target == 'aarch64-apple-darwin'
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo build (release)
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} --features custom-protocol

      - uses: actions/upload-artifact@v6
        with:
          name: ci-binary-${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/${{ matrix.target }}/release/AskHuman
            src-tauri/target/${{ matrix.target }}/release/AskHuman.exe
