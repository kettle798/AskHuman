<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AskHuman</title>
    <!-- 关键内联样式：在外部 CSS 加载前就定好底色，避免加载间隙的白闪。
         prefers-color-scheme 会跟随系统，也会跟随被强制设定的窗口主题。
         macOS 的内部 effect query 决定首帧使用透明材质罩层还是完整实色底。 -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #f0f0f2;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1e1e1e;
        }
      }
      html.material-translucent {
        background: transparent !important;
      }
      html.material-translucent body {
        background: rgba(255, 255, 255, 0.3);
      }
      @media (prefers-color-scheme: dark) {
        html.material-translucent body {
          background: rgba(0, 0, 0, 0.3);
        }
      }
    </style>
    <script>
      // Set the macOS layout and material classes before the first frame.
      try {
        if (/Mac/.test(navigator.userAgent)) {
          var root = document.documentElement;
          var effect = new URLSearchParams(location.search).get("effect");
          root.classList.add("macos");
          root.classList.add(
            effect === "solid" ? "material-solid" : "material-translucent",
          );
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
