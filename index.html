<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HumanInLoop</title>
    <!-- 关键内联样式：在外部 CSS 加载前就定好底色，避免加载间隙的白闪。
         prefers-color-scheme 会跟随系统，也会跟随被强制设定的窗口主题。 -->
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #1e1e1e;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
